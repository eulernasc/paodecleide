<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pão de Cleide — Faça seu pedido</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23FAF6F0'/%3E%3Cellipse cx='32' cy='34' rx='26' ry='22' fill='%23C17B4F'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='22' fill='%23D38E5C'/%3E%3Ccircle cx='20' cy='26' r='2.6' fill='%23A66338'/%3E%3Ccircle cx='36' cy='21' r='2.3' fill='%23A66338'/%3E%3Ccircle cx='45' cy='32' r='2.8' fill='%23A66338'/%3E%3Ccircle cx='24' cy='41' r='2.2' fill='%23A66338'/%3E%3Ccircle cx='40' cy='43' r='2.4' fill='%23A66338'/%3E%3Ccircle cx='30' cy='32' r='1.8' fill='%23A66338'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #F3E8D4;
  --bg-card: #FFFDF8;
  --bg-soft: #ECE0C9;
  --ink: #2B241D;
  --ink-soft: #6B5F52;
  --ink-faint: #A89B8C;
  --terracota: #C17B4F;
  --terracota-dark: #A66338;
  --terracota-light: #F1E0D2;
  --oliva: #6B7355;
  --oliva-dark: #565E43;
  --oliva-light: #E8EBE0;
  --vermelho: #B5544A;
  --vermelho-light: #F5E3E0;
  --line: #DDCBA8;
  --line-strong: #C9B384;
  --shadow: 0 2px 8px rgba(89,58,22,0.10);
  --shadow-card: 0 6px 18px rgba(89,58,22,0.12), 0 1px 3px rgba(89,58,22,0.08);
  --radius: 14px;
  --radius-sm: 10px;
}

*{margin:0;padding:0;box-sizing:border-box;}

button, a, .qtd-btn, .carrinho-bar, .ajuda-btn{
  touch-action: manipulation;
}

body{
  background-color: var(--bg);
  background-image: url('assets/bg-pattern.jpg');
  background-repeat: repeat;
  background-size: 700px auto;
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.app{
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px 100px;
  position: relative;
  z-index: 1;
}

/* ===== HERO ===== */
.hero{
  text-align: center;
  padding: 36px 0 22px;
  position: relative;
  z-index: 1;
}

.hero .photo-wrap{
  position: relative;
  display: inline-block;
  margin-bottom: 16px;
}

.hero .tape{
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%) rotate(-4deg);
  width: 86px;
  height: 28px;
  background: repeating-linear-gradient(135deg, rgba(255,255,255,0.5) 0 6px, rgba(255,255,255,0.25) 6px 12px), var(--terracota-light);
  opacity: 0.65;
  box-shadow: 0 2px 4px rgba(43,36,29,0.10);
  z-index: 3;
}

.hero img{
  width: 138px;
  height: 138px;
  border-radius: 6px;
  object-fit: cover;
  border: 6px solid var(--bg-card);
  box-shadow: 0 6px 18px rgba(43,36,29,0.22), 0 0 0 1px rgba(43,36,29,0.06);
  transform: rotate(-2deg);
  position: relative;
  z-index: 2;
  animation: photoReveal 0.6s cubic-bezier(0.16,1,0.3,1);
}

@keyframes photoReveal{
  0%{ opacity: 0; transform: rotate(-2deg) scale(0.88); }
  100%{ opacity: 1; transform: rotate(-2deg) scale(1); }
}

.hero .accent-mark{
  display: block;
  font-family: 'Caveat', cursive;
  font-size: 21px;
  font-weight: 600;
  color: var(--oliva-dark);
  transform: rotate(-3deg);
  margin-bottom: 2px;
  animation: fadeUp 0.5s ease 0.15s backwards;
}

@keyframes fadeUp{
  0%{ opacity: 0; transform: translateY(8px); }
  100%{ opacity: 1; transform: translateY(0); }
}

.hero .name{
  font-family: 'Fraunces', serif;
  font-size: 32px;
  font-weight: 600;
  color: var(--terracota-dark);
  position: relative;
  animation: fadeUp 0.5s ease 0.22s backwards;
}

.hero .tagline{
  font-size: 13.5px;
  color: var(--ink-soft);
  margin-top: 6px;
  font-style: italic;
  animation: fadeUp 0.5s ease 0.3s backwards;
}

.hero .status{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  padding: 7px 16px;
  border-radius: 20px;
  background: var(--oliva-light);
  color: var(--oliva-dark);
  font-size: 12px;
  font-weight: 600;
  animation: fadeUp 0.5s ease 0.38s backwards;
}

.status-dot{
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--oliva-dark);
  animation: pulse 1.6s ease-in-out infinite;
}

@keyframes pulse{
  0%, 100%{ opacity: 1; transform: scale(1); }
  50%{ opacity: 0.5; transform: scale(0.8); }
}

/* ===== CARDÁPIO ===== */
.section-label{
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  margin: 30px 0 16px;
  position: relative;
  z-index: 1;
  display: inline-block;
}

.section-label::after{
  content: '';
  position: absolute;
  left: -2px;
  right: -6px;
  bottom: -3px;
  height: 7px;
  background: var(--terracota-light);
  z-index: -1;
  transform: rotate(-0.6deg);
}

.produto-card{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
}

.produto-card:hover{
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(89,58,22,0.16), 0 1px 3px rgba(89,58,22,0.1);
}

.produto-card:active{
  transform: translateY(-1px) scale(0.99);
}

.produto-card::before{
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--terracota) 0%, var(--terracota) 40%, transparent 40%, transparent 60%, var(--oliva) 60%, var(--oliva) 100%);
  opacity: 0.55;
  border-radius: var(--radius) var(--radius) 0 0;
}

.produto-thumb-wrap{
  width: 62px;
  height: 62px;
  border-radius: 50%;
  flex-shrink: 0;
  overflow: hidden;
  border: 2px solid var(--bg-card);
  box-shadow: 0 0 0 2px var(--line-strong);
  background: var(--terracota-light);
  display: flex;
  align-items: center;
  justify-content: center;
}

.produto-thumb-img{
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.produto-thumb-icon{
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.produto-thumb-icon svg{
  width: 100%;
  height: 100%;
}

.produto-info{
  flex: 1;
  min-width: 0;
}

.produto-info .nome{
  font-family: 'Fraunces', serif;
  font-size: 15.5px;
  font-weight: 500;
  margin-bottom: 2px;
}

.produto-info .preco{
  color: var(--terracota-dark);
  font-weight: 700;
  font-size: 14px;
  font-family: 'Fraunces', serif;
}

.produto-badge{
  background: var(--terracota-dark);
  color: white;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ===== MODAL DE PRODUTO (estilo iFood) ===== */
.produto-modal{
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: 6px;
}

.foto-galeria{
  position: relative;
  width: 100%;
  height: 300px;
  flex-shrink: 0;
  overflow: hidden;
  background: var(--bg-soft);
}

.foto-galeria-track{
  display: flex;
  height: 100%;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
}

.foto-galeria-track::-webkit-scrollbar{ display: none; }

.foto-galeria-img{
  min-width: 100%;
  height: 100%;
  object-fit: cover;
  scroll-snap-align: start;
}

.foto-dots{
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}

.foto-dot{
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
}

.foto-dot.active{
  background: white;
  transform: scale(1.25);
}

.foto-placeholder{
  width: 100%;
  height: 200px;
  flex-shrink: 0;
  background: var(--terracota-light);
  display: flex;
  align-items: center;
  justify-content: center;
}

.foto-placeholder svg{
  width: 80px;
  height: 80px;
  opacity: 0.5;
}

.produto-modal-body{
  padding: 20px 22px 24px;
  position: relative;
  flex: 1;
  overflow-y: auto;
}

.produto-modal-close{
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  line-height: 1;
}

.produto-modal-nome{
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--ink);
}

.produto-modal-preco{
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 22px;
}

.produto-modal-preco strong{
  color: var(--terracota-dark);
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 700;
}

.produto-modal-un{
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  color: var(--ink-faint);
}

.produto-modal-qtd{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-bottom: 18px;
}

.produto-modal-qtd .qtd-btn{
  width: 44px;
  height: 44px;
  font-size: 20px;
}

.produto-modal-qtd .qtd-valor{
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  min-width: 32px;
}

.empty-cardapio{
  text-align:center;
  padding: 40px 20px;
  color: var(--ink-faint);
  font-size: 13px;
}

/* ===== QTDS (reutilizadas no modal do checkout tb) ===== */
.qtd-control{
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  margin-left: auto;
}

.qtd-btn{
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--bg-card);
  color: var(--ink);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s, color 0.15s, transform 0.15s;
}

.qtd-btn:hover{ border-color: var(--terracota); color: var(--terracota-dark); }
.qtd-btn:active{ transform: scale(0.88); }
.qtd-btn:disabled{ opacity: 0.3; cursor: not-allowed; }

.qtd-valor.bump{ animation: priceBump 0.35s ease; }

@keyframes priceBump{
  0%, 100%{ transform: scale(1); }
  40%{ transform: scale(1.25); color: var(--terracota-dark); }
}

.qtd-valor{
  min-width: 22px;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
  display: inline-block;
}

/* ===== CARRINHO FLUTUANTE ===== */
.carrinho-bar{
  position: fixed;
  bottom: 16px;
  left: 16px;
  right: 16px;
  max-width: 608px;
  margin: 0 auto;
  background: var(--terracota-dark);
  border-radius: 8px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 6px 24px rgba(43,36,29,0.28);
  cursor: pointer;
  z-index: 100;
  transition: transform 0.2s;
  border: 1px solid rgba(255,255,255,0.15);
  animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
}

@keyframes slideUp{
  0%{ transform: translateY(80px); opacity: 0; }
  100%{ transform: translateY(0); opacity: 1; }
}

.carrinho-bar:active{ transform: scale(0.98); }
.carrinho-bar.hidden{ display: none; }

.carrinho-bar .info{
  color: white;
  font-size: 13px;
  opacity: 0.9;
}

.carrinho-bar .total{
  color: white;
  font-weight: 700;
  font-size: 17px;
  font-family: 'Fraunces', serif;
}

.carrinho-bar .cta{
  background: var(--bg-card);
  color: var(--terracota-dark);
  padding: 9px 18px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 13px;
}

/* ===== AJUDA / WHATSAPP ===== */
.ajuda-card{
  position: relative;
  z-index: 1;
  background: var(--bg-card);
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  box-shadow: var(--shadow);
}

.ajuda-text{
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ajuda-text strong{
  font-size: 13px;
  font-family: 'Fraunces', serif;
}

.ajuda-text span{
  font-size: 12px;
  color: var(--ink-faint);
}

.ajuda-btn{
  display: flex;
  align-items: center;
  gap: 6px;
  background: #25D366;
  color: white;
  padding: 9px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  flex-shrink: 0;
  transition: transform 0.15s;
}

.ajuda-btn:hover{ transform: scale(1.05); }

.footer-info{
  position: relative;
  z-index: 1;
  text-align: center;
  color: var(--ink-faint);
  margin-top: 26px;
  padding-bottom: 14px;
  font-family: 'Caveat', cursive;
  font-size: 16px;
}

/* ===== MODAL CHECKOUT ===== */
.modal-overlay{
  position: fixed;
  inset: 0;
  background: rgba(43,36,29,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-overlay.active{ display: flex; animation: overlayFade 0.2s ease; }

@keyframes overlayFade{ from{ opacity: 0; } to{ opacity: 1; } }

.modal{
  background: var(--bg-card);
  border-radius: 6px;
  padding: 26px;
  max-width: 440px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--line);
  animation: modalPop 0.28s cubic-bezier(0.34,1.56,0.64,1);
}

.modal:has(.produto-modal){
  padding: 0;
  overflow: hidden;
  max-width: 480px;
}

@keyframes modalPop{
  0%{ transform: scale(0.93) translateY(8px); opacity: 0; }
  100%{ transform: scale(1) translateY(0); opacity: 1; }
}

.modal h3{
  font-family: 'Fraunces', serif;
  font-size: 19px;
  font-weight: 600;
  margin-bottom: 18px;
  color: var(--terracota-dark);
}

.resumo-pedido{
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 16px;
}

.resumo-item{
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
}

.resumo-total{
  display: flex;
  justify-content: space-between;
  font-weight: 700;
  font-size: 15px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--line-strong);
}

.field{
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 14px;
}

.field label{
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
}

.field input, .field textarea{
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  background: var(--bg-card);
  color: var(--ink);
  outline: none;
}

.field input:focus, .field textarea:focus{ border-color: var(--terracota); }

.pagamento-opcoes{
  display: flex;
  gap: 10px;
}

.pagamento-opcao{
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.pagamento-opcao:has(input:checked){
  border-color: var(--terracota);
  background: var(--terracota-light);
  color: var(--terracota-dark);
}

.pagamento-opcao input{ margin: 0; }

.pix-box{
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 14px;
}

.pix-codigo{
  font-family: monospace;
  font-size: 11px;
  word-break: break-all;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 10px;
  color: var(--ink-soft);
}

.btn{
  background: var(--terracota-dark);
  color: white;
  border: none;
  padding: 13px 20px;
  border-radius: 7px;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  letter-spacing: 0.01em;
}
.btn:hover{ background: #8A5028; }
.btn:disabled{ opacity: 0.5; cursor: not-allowed; }

.btn-outline{
  background: transparent;
  border: 1.5px solid var(--line-strong);
  color: var(--ink);
  padding: 12px 20px;
  border-radius: 7px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
}

.toast-wrap{
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;
}

.toast{
  background: var(--ink);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  animation: toastIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes toastIn{
  0%{ opacity: 0; transform: translateY(-8px) scale(0.96); }
  100%{ opacity: 1; transform: translateY(0) scale(1); }
}

.loading-screen{
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  z-index: 3000;
}
.pao-loader{ display: flex; gap: 10px; }
.pao-loader .pao{
  width: 22px; height: 22px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #D9925E, #C17B4F 70%);
  box-shadow: inset -2px -2px 0 rgba(166,99,56,0.35);
  animation: paoBounce 1.1s ease-in-out infinite;
}
.pao-loader .pao:nth-child(1){ animation-delay: 0s; }
.pao-loader .pao:nth-child(2){ animation-delay: 0.15s; }
.pao-loader .pao:nth-child(3){ animation-delay: 0.3s; }
@keyframes paoBounce{
  0%, 80%, 100% { transform: translateY(0); opacity: 0.7; }
  40% { transform: translateY(-14px); opacity: 1; }
}

.text-soft{ color: var(--ink-soft); }
.text-faint{ color: var(--ink-faint); }
.text-sm{ font-size: 12px; }

@media (max-width: 480px){
  .app{ padding: 0 14px 90px; }

  .hero{ padding: 20px 0 16px; }
  .hero img{ width: 110px; height: 110px; }
  .hero .name{ font-size: 23px; }
  .hero .tagline{ font-size: 12px; padding: 0 10px; }

  .section-label{ font-size: 16px; margin: 18px 0 10px; }

  .produto-card{ padding: 14px; gap: 14px; }
  .produto-thumb{ width: 48px; height: 48px; }
  .produto-info .nome{ font-size: 14px; }
  .produto-info .preco{ font-size: 13px; }
