<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pão de Cleide — Faça seu pedido</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23FAF6F0'/%3E%3Cellipse cx='32' cy='34' rx='26' ry='22' fill='%23C17B4F'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='22' fill='%23D38E5C'/%3E%3Ccircle cx='20' cy='26' r='2.6' fill='%23A66338'/%3E%3Ccircle cx='36' cy='21' r='2.3' fill='%23A66338'/%3E%3Ccircle cx='45' cy='32' r='2.8' fill='%23A66338'/%3E%3Ccircle cx='24' cy='41' r='2.2' fill='%23A66338'/%3E%3Ccircle cx='40' cy='43' r='2.4' fill='%23A66338'/%3E%3Ccircle cx='30' cy='32' r='1.8' fill='%23A66338'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #FAF6F0;
  --bg-card: #FFFFFF;
  --bg-soft: #F3ECE2;
  --ink: #2B241D;
  --ink-soft: #6B5F52;
  --ink-faint: #A89B8C;
  --terracota: #C17B4F;
  --terracota-dark: #A66338;
  --terracota-light: #F1E0D2;
  --oliva: #6B7355;
  --oliva-dark: #565E43;
  --oliva-light: #E8EBE0;
  --vermelho: #B5544A;
  --vermelho-light: #F5E3E0;
  --line: #E8DFD3;
  --line-strong: #D8CBB8;
  --shadow: 0 1px 3px rgba(43,36,29,0.06);
  --radius: 14px;
  --radius-sm: 9px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.app{
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px 100px;
}

/* ===== HERO ===== */
.hero{
  text-align: center;
  padding: 28px 0 20px;
}

.hero img{
  width: 140px;
  height: 140px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 4px 16px rgba(43,36,29,0.12);
  margin-bottom: 14px;
}

.hero .name{
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--terracota-dark);
}

.hero .tagline{
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 4px;
}

.hero .status{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--oliva-light);
  color: var(--oliva-dark);
  font-size: 12px;
  font-weight: 600;
}

.hero .status-dot{
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--oliva-dark);
}

/* ===== CARDÁPIO ===== */
.section-label{
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  margin: 24px 0 14px;
}

.produto-card{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow);
}

.produto-thumb{
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--terracota-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 22px;
}

.produto-info{
  flex: 1;
  min-width: 0;
}

.produto-info .nome{
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 2px;
}

.produto-info .preco{
  color: var(--terracota-dark);
  font-weight: 600;
  font-size: 14px;
}

.produto-info .estoque-info{
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 2px;
}

.qtd-control{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.qtd-btn{
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--bg-card);
  color: var(--ink);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.qtd-btn:hover{ background: var(--bg-soft); }
.qtd-btn:active{ transform: scale(0.95); }
.qtd-btn:disabled{ opacity: 0.3; cursor: not-allowed; }

.qtd-valor{
  min-width: 22px;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
}

.empty-cardapio{
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-faint);
  font-size: 13px;
}

/* ===== CARRINHO FLUTUANTE ===== */
.carrinho-bar{
  position: fixed;
  bottom: 16px;
  left: 16px;
  right: 16px;
  max-width: 608px;
  margin: 0 auto;
  background: var(--terracota);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(43,36,29,0.2);
  cursor: pointer;
  z-index: 100;
  transition: transform 0.2s;
}

.carrinho-bar:active{ transform: scale(0.98); }

.carrinho-bar.hidden{ display: none; }

.carrinho-bar .info{
  color: white;
  font-size: 13px;
}

.carrinho-bar .total{
  color: white;
  font-weight: 700;
  font-size: 16px;
}

.carrinho-bar .cta{
  background: white;
  color: var(--terracota-dark);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13px;
}

/* ===== MODAL CHECKOUT ===== */
.modal-overlay{
  position: fixed;
  inset: 0;
  background: rgba(43,36,29,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-overlay.active{ display: flex; }

.modal{
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 440px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h3{
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 16px;
}

.resumo-pedido{
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 16px;
}

.resumo-item{
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
}

.resumo-total{
  display: flex;
  justify-content: space-between;
  font-weight: 700;
  font-size: 15px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--line-strong);
}

.field{
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 14px;
}

.field label{
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
}

.field input, .field textarea{
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  background: var(--bg-card);
  color: var(--ink);
  outline: none;
}

.field input:focus, .field textarea:focus{ border-color: var(--terracota); }

.btn{
  background: var(--terracota);
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
}
.btn:hover{ background: var(--terracota-dark); }
.btn:disabled{ opacity: 0.5; cursor: not-allowed; }

.btn-outline{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
}

.toast-wrap{
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;
}

.toast{
  background: var(--ink);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.loading-screen{
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  z-index: 3000;
}
.pao-loader{ display: flex; gap: 10px; }
.pao-loader .pao{
  width: 22px; height: 22px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #D9925E, #C17B4F 70%);
  box-shadow: inset -2px -2px 0 rgba(166,99,56,0.35);
  animation: paoBounce 1.1s ease-in-out infinite;
}
.pao-loader .pao:nth-child(1){ animation-delay: 0s; }
.pao-loader .pao:nth-child(2){ animation-delay: 0.15s; }
.pao-loader .pao:nth-child(3){ animation-delay: 0.3s; }
@keyframes paoBounce{
  0%, 80%, 100% { transform: translateY(0); opacity: 0.7; }
  40% { transform: translateY(-14px); opacity: 1; }
}

.text-soft{ color: var(--ink-soft); }
.text-faint{ color: var(--ink-faint); }
.text-sm{ font-size: 12px; }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="pao-loader"><div class="pao"></div><div class="pao"></div><div class="pao"></div></div>
  <div class="text-soft text-sm">Carregando cardápio...</div>
</div>

<div class="app" id="app" style="display:none;">

  <div class="hero">
    <img src="assets/logo.jpg" alt="Pão de Cleide">
    <div class="name">Pão de Cleide</div>
    <div class="tagline">Pão de queijo e coxinha, feitos com carinho</div>
    <div class="status"><span class="status-dot"></span> Aberto para encomendas</div>
  </div>

  <div class="section-label">Cardápio</div>
  <div id="cardapioList"></div>

</div>

<div class="carrinho-bar hidden" id="carrinhoBar">
  <div>
    <div class="info" id="carrinhoInfo">0 itens</div>
    <div class="total" id="carrinhoTotal">R$ 0,00</div>
  </div>
  <div class="cta">Ver pedido</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

</body>
</html>
