<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #FAF6F0;
  --bg-card: #FFFFFF;
  --bg-soft: #F3ECE2;
  --ink: #2B241D;
  --ink-soft: #6B5F52;
  --ink-faint: #A89B8C;
  --terracota: #C17B4F;
  --terracota-dark: #A66338;
  --terracota-light: #F1E0D2;
  --oliva: #6B7355;
  --oliva-dark: #565E43;
  --oliva-light: #E8EBE0;
  --vermelho: #B5544A;
  --vermelho-light: #F5E3E0;
  --line: #E8DFD3;
  --line-strong: #D8CBB8;
  --shadow: 0 1px 3px rgba(43,36,29,0.06);
  --radius: 14px;
  --radius-sm: 9px;
}

*{margin:0;padding:0;box-sizing:border-box;}

button, a, .qtd-btn, .carrinho-bar, .ajuda-btn{
  touch-action: manipulation;
}

body{
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.app{
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px 100px;
  position: relative;
  z-index: 1;
}

.watermark-layer{
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.watermark-icon{
  position: absolute;
  opacity: 0.14;
}

/* ===== HERO ===== */
.hero{
  text-align: center;
  padding: 28px 0 20px;
  position: relative;
  z-index: 1;
}

.hero img{
  width: 140px;
  height: 140px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 4px 16px rgba(43,36,29,0.12);
  margin-bottom: 14px;
}

.hero .name{
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--terracota-dark);
}

.hero .tagline{
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 4px;
}

.hero .status{
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--oliva-light);
  color: var(--oliva-dark);
  font-size: 12px;
  font-weight: 600;
}

.hero .status-dot{
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--oliva-dark);
}

/* ===== CARDÁPIO ===== */
.section-label{
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  margin: 24px 0 14px;
  position: relative;
  z-index: 1;
}

.produto-card{
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: var(--shadow);
}

.produto-thumb{
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--terracota-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}

.produto-thumb svg{
  width: 100%;
  height: 100%;
}

.produto-info{
  flex: 1;
  min-width: 0;
}

.produto-info .nome{
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 2px;
}

.produto-info .preco{
  color: var(--terracota-dark);
  font-weight: 600;
  font-size: 14px;
}

.produto-info .estoque-info{
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 2px;
}

.qtd-control{
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.qtd-btn{
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--bg-card);
  color: var(--ink);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.qtd-btn:hover{ background: var(--bg-soft); }
.qtd-btn:active{ transform: scale(0.95); }
.qtd-btn:disabled{ opacity: 0.3; cursor: not-allowed; }

.qtd-valor{
  min-width: 22px;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
}

.empty-cardapio{
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-faint);
  font-size: 13px;
}

/* ===== CARRINHO FLUTUANTE ===== */
.carrinho-bar{
  position: fixed;
  bottom: 16px;
  left: 16px;
  right: 16px;
  max-width: 608px;
  margin: 0 auto;
  background: var(--terracota);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(43,36,29,0.2);
  cursor: pointer;
  z-index: 100;
  transition: transform 0.2s;
}

.carrinho-bar:active{ transform: scale(0.98); }

.carrinho-bar.hidden{ display: none; }

.carrinho-bar .info{
  color: white;
  font-size: 13px;
}

.carrinho-bar .total{
  color: white;
  font-weight: 700;
  font-size: 16px;
}

.carrinho-bar .cta{
  background: white;
  color: var(--terracota-dark);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13px;
}

/* ===== MODAL CHECKOUT ===== */
.modal-overlay{
  position: fixed;
  inset: 0;
  background: rgba(43,36,29,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-overlay.active{ display: flex; }

.modal{
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 440px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}

.modal h3{
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 16px;
}

.resumo-pedido{
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 16px;
}

.resumo-item{
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
}

.resumo-total{
  display: flex;
  justify-content: space-between;
  font-weight: 700;
  font-size: 15px;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--line-strong);
}

.pagamento-opcoes{
  display: flex;
  gap: 10px;
}

.pagamento-opcao{
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.pagamento-opcao:has(input:checked){
  border-color: var(--terracota);
  background: var(--terracota-light);
  color: var(--terracota-dark);
}

.pagamento-opcao input{
  margin: 0;
}

.pix-box{
  background: var(--bg-soft);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 14px;
}

.pix-codigo{
  font-family: monospace;
  font-size: 11px;
  word-break: break-all;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 10px;
  color: var(--ink-soft);
}

.field{
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 14px;
}

.field label{
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
}

.field input, .field textarea{
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  background: var(--bg-card);
  color: var(--ink);
  outline: none;
}

.field input:focus, .field textarea:focus{ border-color: var(--terracota); }

.btn{
  background: var(--terracota);
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
}
.btn:hover{ background: var(--terracota-dark); }
.btn:disabled{ opacity: 0.5; cursor: not-allowed; }

.btn-outline{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--ink);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
}

.toast-wrap{
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2000;
}

.toast{
  background: var(--ink);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
}

.loading-screen{
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  z-index: 3000;
}
.pao-loader{ display: flex; gap: 10px; }
.pao-loader .pao{
  width: 22px; height: 22px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #D9925E, #C17B4F 70%);
  box-shadow: inset -2px -2px 0 rgba(166,99,56,0.35);
  animation: paoBounce 1.1s ease-in-out infinite;
}
.pao-loader .pao:nth-child(1){ animation-delay: 0s; }
.pao-loader .pao:nth-child(2){ animation-delay: 0.15s; }
.pao-loader .pao:nth-child(3){ animation-delay: 0.3s; }
@keyframes paoBounce{
  0%, 80%, 100% { transform: translateY(0); opacity: 0.7; }
  40% { transform: translateY(-14px); opacity: 1; }
}

.ajuda-card{
  position: relative;
  z-index: 1;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.ajuda-text{
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ajuda-text strong{
  font-size: 13px;
}

.ajuda-text span{
  font-size: 12px;
  color: var(--ink-faint);
}

.ajuda-btn{
  display: flex;
  align-items: center;
  gap: 6px;
  background: #25D366;
  color: white;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  flex-shrink: 0;
}

.footer-info{
  position: relative;
  z-index: 1;
  text-align: center;
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 20px;
  padding-bottom: 10px;
}

.text-soft{ color: var(--ink-soft); }
.text-faint{ color: var(--ink-faint); }
.text-sm{ font-size: 12px; }

@media (max-width: 480px){
  .app{ padding: 0 14px 90px; }

  .hero{ padding: 20px 0 16px; }
  .hero img{ width: 110px; height: 110px; }
  .hero .name{ font-size: 23px; }
  .hero .tagline{ font-size: 12px; padding: 0 10px; }

  .section-label{ font-size: 16px; margin: 18px 0 10px; }

  .produto-card{
    padding: 12px;
    gap: 10px;
  }
  .produto-thumb{ width: 48px; height: 48px; }
  .produto-info .nome{ font-size: 14px; }
  .produto-info .preco{ font-size: 13px; }

  .qtd-control{ gap: 6px; }
  .qtd-btn{ width: 34px; height: 34px; font-size: 17px; }
  .qtd-valor{ min-width: 18px; }

  .ajuda-card{
    flex-direction: column;
    align-items: stretch;
    text-align: center;
    gap: 10px;
  }
  .ajuda-btn{ justify-content: center; }

  .carrinho-bar{
    left: 10px;
    right: 10px;
    bottom: 10px;
    padding: 12px 14px;
  }

  .modal{
    padding: 18px;
    border-radius: var(--radius);
    max-height: 85vh;
  }
  .modal h3{ font-size: 16px; }

  .pagamento-opcoes{ gap: 8px; }
  .pagamento-opcao{ padding: 12px 8px; font-size: 12px; }

  .pix-codigo{ font-size: 10px; }

  .watermark-layer{ display: none; }
}

@media (min-width: 481px) and (max-width: 900px){
  .watermark-icon{ opacity: 0.08; }
}

@media (max-width: 360px){
  .hero .name{ font-size: 20px; }
  .produto-info .nome{ font-size: 13px; }
  .qtd-control{ gap: 4px; }
}
</style>
</head>
